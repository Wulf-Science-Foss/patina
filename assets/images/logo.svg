<svg width="680" height="280" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Patina PLM logotype</title>
<desc>Abstract mark of four stacked offset layers in copper-to-teal tones, beside the wordmark "patina" in a precise monospace typeface with "plm" as a subtitle</desc>

<style>
  .wm-main { font-family: 'Courier New', Courier, monospace; font-size: 72px; font-weight: 400; letter-spacing: -2px; }
  .wm-sub  { font-family: 'Courier New', Courier, monospace; font-size: 22px; font-weight: 400; letter-spacing: 8px; }
  .wm-tag  { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 400; letter-spacing: 3px; }

  /* Light mode (default) */
  .wm-main { fill: #1a1a1a; }
  .wm-sub  { fill: #111111; }
  .wm-tag  { fill: #222222; }
  .rule    { stroke: #cccccc; }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .wm-main { fill: #f0f0f0; }
    .wm-sub  { fill: #aaaaaa; }
    .wm-tag  { fill: #777777; }
    .rule    { stroke: #444444; }
  }
</style>

<!-- Mark: four stacked parallelogram layers — oxidised metal strata / revision layers -->
<polygon points="72,196 196,196 212,220 88,220" fill="#2d6a5a" opacity="0.85"/>
<polygon points="80,158 204,158 196,182 72,182" fill="#3d9e82" opacity="0.85"/>
<polygon points="92,120 216,120 204,144 80,144" fill="#6ec4a7" opacity="0.9"/>
<polygon points="108,84 220,84 212,108 96,108"  fill="#a8dece" opacity="0.85"/>

<!-- Rule -->
<line x1="248" y1="72" x2="248" y2="224" class="rule" stroke-width="0.75"/>

<!-- Wordmark -->
<text x="272" y="190" class="wm-main">patina</text>
<text x="275" y="222" class="wm-sub">plm</text>
<text x="275" y="248" class="wm-tag">open product lifecycle</text>

</svg>
